<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Serra Nevada → Paris 2026</title>
<style>
  :root{
    --navy: #0A1B2E;
    --navy2: #102841;
    --navy3: #16324F;
    --sky: #35A7E8;
    --pulse: #FB7185;
    --gold: #F2B705;
    --mist: #93A9BD;
    --ink: #EAF3FB;
    --line: rgba(255,255,255,0.10);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  button{ font-family:inherit; color:inherit; font-size:inherit; text-align:inherit; }
  html,body{ margin:0; height:100%; }
  body{
    background: var(--navy);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height:100vh;
  }
  .display{
    font-family: "Arial Narrow", Arial, sans-serif;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.01em;
  }
  .mono{ font-family:"SF Mono","Courier New",monospace; font-variant-numeric: tabular-nums; }

  #app{ max-width: 480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .topbar .brand{ display:flex; align-items:center; gap:8px; }
  .wave{ width:22px; height:14px; flex:none; }
  .brand-text{ font-size:12px; letter-spacing:.08em; color:var(--mist); text-transform:uppercase; }
  .back-btn{
    background:none; border:none; color: var(--sky); font-size:14px; font-weight:700;
    cursor:pointer; padding:6px 4px;
  }

  main{ flex:1; padding: 18px 18px 40px; }

  .hero{ padding: 18px 2px 8px; }
  .eyebrow{
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color: var(--gold); font-weight:700; margin:0 0 6px;
  }
  .hero h1{ margin:0 0 4px; font-size: 26px; line-height:1.08; }
  .hero .sub{ color:var(--mist); font-size:13.5px; margin:0 0 22px; }

  .clock{ display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin-bottom: 22px; }
  .clock .cell{ background: var(--navy2); border: 1px solid var(--line); border-radius:10px; padding: 14px 4px 10px; text-align:center; }
  .clock .num{ font-size: 30px; font-weight:700; line-height:1; }
  .clock .unit{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--mist); margin-top:6px; }
  .clock .cell.days{ border-color: rgba(242,183,5,0.35); background: linear-gradient(180deg, rgba(242,183,5,0.08), var(--navy2)); }
  .clock .cell.days .num{ color: var(--gold); }
  .race-meta{ display:flex; justify-content:space-between; font-size:12px; color:var(--mist); border-top:1px solid var(--line); padding-top:12px; margin-bottom: 8px; }
  .race-meta b{ color: var(--ink); }

  .section-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--mist); margin: 26px 0 10px; }
  .athlete-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .athlete-tile{ background: var(--navy2); border:1px solid var(--line); border-radius:12px; padding:16px 12px; text-align:left; color:var(--ink); cursor:pointer; display:flex; flex-direction:column; gap:8px; }
  .athlete-tile:active{ background: var(--navy3); }
  .athlete-tile .avatar{ width:34px; height:34px; border-radius:50%; background: var(--sky); color:var(--navy); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; }
  .athlete-tile .name{ font-weight:700; font-size:14.5px; }
  .athlete-tile .meta{ font-size:11.5px; color:var(--mist); }

  .link-row{ display:flex; justify-content:center; margin-top:28px; padding-top:16px; border-top:1px solid var(--line); }
  .text-link{ background:none; border:none; color:var(--sky); font-size:13px; font-weight:700; cursor:pointer; padding:6px 0; }
  .fc-toggle{
    flex:none; padding:8px 14px; font-size:11.5px; font-weight:800;
    border-radius:20px; border:1px solid var(--line);
    background: var(--navy3); color: var(--ink); cursor:pointer;
  }
  .fc-toggle.on{ background: var(--pulse); color:#1a0e10; border-color:var(--pulse); }

  .page-title{ font-size:22px; margin: 4px 0 2px; }
  .page-sub{ color:var(--mist); font-size:13px; margin:0 0 20px; }

  .empty{ background:var(--navy2); border:1px dashed var(--line); border-radius:12px; padding: 28px 18px; text-align:center; color:var(--mist); font-size:13.5px; margin-top:10px; }

  .session-card{ background: var(--navy2); border:1px solid var(--line); border-radius:14px; padding:16px 16px 14px; margin-bottom:14px; }
  .session-card .s-title{ font-weight:700; font-size:15px; margin:0 0 2px; }
  .session-card .s-date{ font-size:11.5px; color:var(--mist); margin:0 0 12px; }

  table.times{ width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:6px; }
  table.times th, table.times td{ padding:6px 4px; text-align:center; border-bottom:1px solid var(--line); }
  table.times th{ font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:#fff; }
  .chart-legend{ display:flex; flex-wrap:wrap; gap:10px; margin: 4px 0 10px; }
  .chart-legend .item{ display:flex; align-items:center; gap:5px; font-size:10.5px; color:var(--mist); }
  .chart-legend .dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .chart-box{ background: #FFFFFF; border-radius:10px; padding:10px 8px 4px; margin-bottom:14px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  table.times td.time.hl{ background: var(--gold); color: var(--navy); font-weight:800; border-radius:5px; }
  table.times td.rep{ color:var(--mist); font-weight:700; }
  table.times td.time{ font-family:"SF Mono","Courier New",monospace; }
  table.times td.best{ color: var(--gold); font-weight:700; }
  table.times tfoot td{ font-weight:700; border-bottom:none; padding-top:8px; }
  table.times tfoot tr:first-child td{ border-top:1px solid var(--line); padding-top:10px; }
  table.times tfoot tr.total td{ color: var(--sky); }
  table.times tfoot tr.hr td{ color: var(--pulse); font-size:11.5px; }
  table.times tfoot tr.hr td.rep{ color: var(--pulse); }
  .rep-hr{ font-size:8.5px; color:var(--pulse); font-family:"SF Mono","Courier New",monospace; margin-top:1px; opacity:0.9; }

  table.endurance-table{ width:100%; border-collapse:collapse; font-size:11.5px; margin-bottom:6px; }
  table.endurance-table th, table.endurance-table td{ padding:8px 5px; text-align:center; border-bottom:1px solid var(--line); }
  table.endurance-table th{ color:var(--mist); font-weight:700; font-size:9.5px; text-transform:uppercase; letter-spacing:.03em; }
  table.endurance-table td.rep{ color:var(--mist); font-weight:700; }
  table.endurance-table td.desc{ text-align:left; font-size:10.5px; color:var(--ink); max-width:120px; }
  table.endurance-table td.time{ font-family:"SF Mono","Courier New",monospace; white-space:nowrap; }
  table.endurance-table td.hrcell{ color:var(--pulse); }
  table.endurance-table .delta{ display:block; font-size:8.5px; color:var(--mist); margin-top:1px; }

  .stat-strip{ display:flex; gap:8px; margin-top:10px; }
  .stat-chip{ flex:1; background: var(--navy3); border-radius:8px; padding:8px 10px; }
  .stat-chip .l{ font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--mist); }
  .stat-chip .v{ font-family:"SF Mono","Courier New",monospace; font-size:14px; font-weight:700; }

  footer.foot{ text-align:center; font-size:11px; color: var(--mist); padding: 10px 0 0; }
</style>
</head>

let state = { view: "home", athlete: null, sessionId: null };

function initials(name){ return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function athleteHasData(session, name){
  const d = session.athletes[name];
  if(!d) return false;
  if(Array.isArray(d)) return d.length>0;
  if(d.reps) return d.reps.length>0;
  return false;
}
function fmt2(n){ return n.toString().padStart(2,"0"); }
function secToClock(totalSeconds){
  const m = Math.floor(totalSeconds/60);
  const s = (totalSeconds - m*60);
  return m + ":" + s.toFixed(2).padStart(5,"0");
}
function seriesAvg(times){ return times.reduce((a,b)=>a+b,0)/times.length; }
function seriesTotal(times){ return times.reduce((a,b)=>a+b,0); }
function seriesBest(times){ return Math.min(...times); }
function formatDate(iso){
  const d = new Date(iso+"T12:00:00");
  return d.toLocaleDateString("pt-PT", {weekday:"long", day:"numeric", month:"long"});
}

/* ============== RENDER SHELL ============== */

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(renderTopbar());
  const main = document.createElement("main");
  main.appendChild(renderView());
  app.appendChild(main);
}

function renderTopbar(){
  const bar = document.createElement("div");
  bar.className = "topbar";
  const brand = document.createElement("div");
  brand.className = "brand";
  brand.innerHTML = `
    <svg class="wave" viewBox="0 0 32 20" fill="none">
      <path d="M1 6c3-4 6-4 9 0s6 4 9 0 6-4 9 0" stroke="#35A7E8" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M1 14c3-4 6-4 9 0s6 4 9 0 6-4 9 0" stroke="#F2B705" stroke-width="2.4" stroke-linecap="round" opacity="0.6"/>
    </svg>
    <span class="brand-text">Serra Nevada &rarr; Paris 2026</span>
  `;
  bar.appendChild(brand);
  if(state.view !== "home"){
    const back = document.createElement("button");
    back.className = "back-btn";
    if(state.view === "athlete-session"){
      back.textContent = "‹ " + state.athlete.split(" ")[0];
      back.onclick = () => { state.view = "athlete"; state.sessionId = null; render(); };
    }else{
      back.textContent = "‹ Início";
      back.onclick = () => { state.view = "home"; state.athlete = null; state.sessionId = null; render(); };
    }
    bar.appendChild(back);
  }
  return bar;
}

function renderView(){
  switch(state.view){
    case "home": return viewHome();
    case "athlete": return viewAthlete();
    case "athlete-session": return viewAthleteSession();
    case "task-list": return viewTaskList();
    case "task": return viewTask();
    default: return viewHome();
  }
}

/* ============== HOME ============== */

function viewHome(){
  const wrap = document.createElement("div");
  const hero = document.createElement("div");
  hero.className = "hero";

  const now = Date.now();
  const diff = Math.max(0, RACE_UTC - now);
  const totalSec = Math.floor(diff/1000);
  const days = Math.floor(totalSec/86400);
  const hours = Math.floor((totalSec%86400)/3600);
  const mins = Math.floor((totalSec%3600)/60);
  const secs = totalSec%60;

  hero.innerHTML = `
    <p class="eyebrow">Estágio em altitude · Serra Nevada</p>
    <h1 class="display">10K Open Water<br>Swimming</h1>
    <p class="sub">European Aquatics Championships · Rio Sena</p>
    <div class="clock">
      <div class="cell days"><div class="num mono">${days}</div><div class="unit">dias</div></div>
      <div class="cell"><div class="num mono">${fmt2(hours)}</div><div class="unit">horas</div></div>
      <div class="cell"><div class="num mono">${fmt2(mins)}</div><div class="unit">min</div></div>
      <div class="cell"><div class="num mono">${fmt2(secs)}</div><div class="unit">seg</div></div>
    </div>
    <div class="race-meta">
      <span>4 ago · <b>10:00</b> Paris</span>
    </div>
  `;
  wrap.appendChild(hero);

  const label = document.createElement("p");
  label.className = "section-label";
  label.textContent = "Ver treinos por atleta";
  wrap.appendChild(label);

  const grid = document.createElement("div");
  grid.className = "athlete-grid";
  ATHLETES.forEach(name=>{
    const tile = document.createElement("button");
    tile.className = "athlete-tile";
    const count = SESSIONS.filter(s=>athleteHasData(s, name)).length;
    tile.innerHTML = `
      <span class="avatar">${initials(name)}</span>
      <span class="name">${name}</span>
      <span class="meta">${count} treino${count===1?"":"s"}</span>
    `;
    tile.onclick = ()=>{ state.view="athlete"; state.athlete=name; render(); };
    grid.appendChild(tile);
  });
  wrap.appendChild(grid);

  const linkRow = document.createElement("div");
  linkRow.className = "link-row";
  const taskBtn = document.createElement("button");
  taskBtn.className = "text-link";
  taskBtn.textContent = "Ver por tarefa →";
  taskBtn.onclick = ()=>{ state.view="task-list"; render(); };
  linkRow.appendChild(taskBtn);
  wrap.appendChild(linkRow);

  return wrap;
}

/* ============== ATHLETE VIEW ============== */

function viewAthlete(){
  const wrap = document.createElement("div");
  const mySessions = SESSIONS
    .filter(s=>athleteHasData(s, state.athlete))
    .sort((a,b)=> b.date.localeCompare(a.date));

  wrap.innerHTML = `<p class="page-title" style="font-weight:700">${state.athlete}</p>
    <p class="page-sub">${mySessions.length} treino${mySessions.length===1?"":"s"}</p>`;

  if(mySessions.length===0){
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "Ainda não há treinos registados para este atleta.";
    wrap.appendChild(e);
    return wrap;
  }

  mySessions.forEach(s=>{
    const btn = document.createElement("button");
    btn.className = "session-card";
    btn.style.width = "100%";
    btn.style.textAlign = "left";
    btn.style.cursor = "pointer";
    btn.innerHTML = `<p class="s-title">${s.title}</p><p class="s-date" style="margin-bottom:0">${s.session || formatDate(s.date)}</p>`;
    btn.onclick = ()=>{ state.view="athlete-session"; state.sessionId=s.id; render(); };
    wrap.appendChild(btn);
  });
  return wrap;
}

function viewAthleteSession(){
  const wrap = document.createElement("div");
  const session = SESSIONS.find(s=>s.id===state.sessionId);
  if(!session){
    wrap.innerHTML = `<div class="empty">Sessão não encontrada.</div>`;
    return wrap;
  }
  const label = document.createElement("p");
  label.className = "page-title";
  label.style.cssText = "font-weight:700; font-size:15px; color:#93A9BD; margin-bottom:14px;";
  label.textContent = state.athlete;
  wrap.appendChild(label);
  const card = (session.type === "endurance")
    ? renderEnduranceSessionCard(session, state.athlete)
    : renderAthleteSessionCard(session, state.athlete);
  wrap.appendChild(card);
  return wrap;
}

function buildChartSVG(seriesArr, opts){
  opts = opts || {};
  const showHR = !!opts.showHR;
  const isolated = (opts.isolated===undefined) ? null : opts.isolated;
  const W=300, H=150, padL=32, padR = showHR ? 30 : 6, padT=8, padB=16;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxLen = Math.max(...seriesArr.map(s=>s.times.length));

  const allVals = seriesArr.flatMap(s=>s.times);
  const min=Math.min(...allVals), max=Math.max(...allVals);
  const pad=(max-min)*0.2 || 0.3;
  const dMin=min-pad, dMax=max+pad;
  const xFor = i => padL + (maxLen<=1?0:(i/(maxLen-1))*plotW);
  const yFor = v => padT + (dMax-v)/(dMax-dMin)*plotH;

  let hrMin=90, hrMax=190, yForHR = ()=>0;
  if(showHR){
    const allHR = seriesArr.flatMap(s=>s.hr||[]);
    if(allHR.length){
      hrMin = Math.min(...allHR)-5;
      hrMax = Math.max(...allHR)+5;
    }
    yForHR = v => padT + (hrMax-v)/(hrMax-hrMin)*plotH;
  }

  let bg = `<rect x="0" y="0" width="${W}" height="${H}" fill="#FFFFFF"/>`;

  let grid = '';
  const STEPS = 5;
  for(let g=0; g<=STEPS; g++){
    const gv = dMin + (dMax-dMin)*g/STEPS;
    const gy = yFor(gv);
    grid += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#E7EEF3" stroke-width="1"/>`;
    grid += `<text x="${padL-4}" y="${(gy+2.5).toFixed(1)}" font-size="7" fill="#6B8598" text-anchor="end">${gv.toFixed(2)}</text>`;
    if(showHR){
      const hv = hrMin + (hrMax-hrMin)*g/STEPS;
      grid += `<text x="${(W-padR+4).toFixed(1)}" y="${(gy+2.5).toFixed(1)}" font-size="7" fill="#FB7185" text-anchor="start">${Math.round(hv)}</text>`;
    }
  }
  if(showHR){
    grid += `<text x="${W-2}" y="${padT-2}" font-size="6.5" fill="#FB7185" text-anchor="end">bpm</text>`;
  }

  let lines = '';
  const HR_SAMPLE_INTERVAL = 2; // seconds between each stored HR sample
  const REP_INTERVAL = 50;      // seconds per rep — the 50'' send-off, treated as ground truth
  seriesArr.forEach((s,idx)=>{
    if(isolated!==null && isolated!==idx) return;
    const color = SERIES_COLORS[idx % SERIES_COLORS.length];
    const pts = s.times.map((t,i)=> `${xFor(i).toFixed(1)},${yFor(t).toFixed(1)}`).join(' ');
    lines += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>`;
    s.times.forEach((t,i)=>{
      lines += `<circle class="pt" data-s="${idx}" data-r="${i}" cx="${xFor(i).toFixed(1)}" cy="${yFor(t).toFixed(1)}" r="2.6" fill="${color}" stroke="#FFFFFF" stroke-width="1"/>`;
    });

    if(showHR && s.hr && s.hr.length){
      // only the window that corresponds to the reps themselves, using the
      // known-correct send-off interval as the time axis — not the raw
      // recording length, which also contains the rest that follows and would
      // otherwise get compressed into the same space as the reps. Points are
      // capped at the last rep's x position so the curve never overflows the plot.
      const maxRepPos = s.times.length - 1;
      const hrPtsArr = [];
      for(let i=0;i<s.hr.length;i++){
        const elapsedSec = i*HR_SAMPLE_INTERVAL;
        const repPos = elapsedSec/REP_INTERVAL;
        if(repPos > maxRepPos) break;
        hrPtsArr.push(`${xFor(repPos).toFixed(1)},${yForHR(s.hr[i]).toFixed(1)}`);
      }
      const hrPts = hrPtsArr.join(' ');
      lines += `<polyline points="${hrPts}" fill="none" stroke="${color}" stroke-width="0.8" stroke-dasharray="3,2.5" opacity="0.75" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
  });

  let xlabels = '';
  for(let i=0;i<maxLen;i++){
    xlabels += `<text x="${xFor(i).toFixed(1)}" y="${H-3}" font-size="7" fill="#6B8598" text-anchor="middle">${i+1}</text>`;
  }

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">${bg}${grid}${lines}${xlabels}</svg>`;
}

function buildChartLegend(seriesArr, opts, onToggleSeries){
  opts = opts || {};
  const isolated = (opts.isolated===undefined) ? null : opts.isolated;
  const legend = document.createElement("div");
  legend.className = "chart-legend";
  seriesArr.forEach((s,idx)=>{
    const item = document.createElement("button");
    item.type = "button";
    item.className = "item";
    const dimmed = (isolated!==null && isolated!==idx);
    item.style.cssText = "background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:6px;" + (dimmed ? "opacity:0.4;" : "") + (isolated===idx ? "background:rgba(53,167,232,0.12);" : "");
    item.innerHTML = `<span class="dot" style="background:${SERIES_COLORS[idx % SERIES_COLORS.length]}"></span>${s.label} série`;
    item.addEventListener("click", ()=> onToggleSeries(idx));
    legend.appendChild(item);
  });
  return legend;
}

function renderAthleteSessionCard(session, athleteName){
  const card = document.createElement("div");
  card.className = "session-card";
  const seriesArr = session.athletes[athleteName];
  const hasHR = seriesArr.every(sr=>sr.hr && sr.hr.length);

  let allTimes = [];
  seriesArr.forEach(sr=> allTimes = allTimes.concat(sr.times));
  const overallAvg = seriesAvg(allTimes);
  const overallBest = seriesBest(allTimes);
  const maxLen = Math.max(...seriesArr.map(sr=>sr.times.length));

  card.innerHTML = `
    <p class="s-title">${session.title}</p>
    <p class="s-date">${session.session || formatDate(session.date)}</p>
  `;

  const controlsRow = document.createElement("div");
  controlsRow.style.cssText = "display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;";
  const legendHolder = document.createElement("div");
  legendHolder.style.flex = "1";
  controlsRow.appendChild(legendHolder);

  let hrToggle = null;
  if(hasHR){
    hrToggle = document.createElement("button");
    hrToggle.type = "button";
    hrToggle.className = "fc-toggle";
    controlsRow.appendChild(hrToggle);
  }
  card.appendChild(controlsRow);

  const chartBox = document.createElement("div");
  chartBox.className = "chart-box";
  card.appendChild(chartBox);

  const tableWrap = document.createElement("div");
  card.appendChild(tableWrap);

  let showHR = false;
  let isolated = null;

  function redraw(){
    legendHolder.innerHTML = "";
    legendHolder.appendChild(buildChartLegend(seriesArr, {isolated}, (idx)=>{
      isolated = (isolated===idx) ? null : idx;
      redraw();
    }));

    if(hrToggle){
      hrToggle.textContent = showHR ? "FC: ligada" : "Mostrar FC";
      hrToggle.className = "fc-toggle" + (showHR ? " on" : "");
    }

    chartBox.innerHTML = buildChartSVG(seriesArr, {showHR, isolated});
    chartBox.querySelectorAll("circle.pt").forEach(pt=>{
      pt.addEventListener("click", ()=>{
        const s = pt.getAttribute("data-s");
        const r = pt.getAttribute("data-r");
        card.querySelectorAll("td.time.hl").forEach(td=>td.classList.remove("hl"));
        chartBox.querySelectorAll("circle.pt").forEach(p=>{ p.setAttribute("r","2.6"); });
        const targetTd = tableWrap.querySelector(`td[data-s="${s}"][data-r="${r}"]`);
        if(targetTd){
          targetTd.classList.add("hl");
          if(typeof targetTd.scrollIntoView === "function"){
            targetTd.scrollIntoView({behavior:"smooth", block:"nearest"});
          }
        }
        pt.setAttribute("r","4");
      });
    });

    let theadCols = seriesArr.map((sr,idx)=>`<th style="background:${SERIES_COLORS[idx % SERIES_COLORS.length]}">${sr.label}</th>`).join("");
    let bodyRows = "";
    for(let r=0;r<maxLen;r++){
      let cols = seriesArr.map((sr,sIdx)=>{
        if(r>=sr.times.length) return `<td class="time">–</td>`;
        const t = sr.times[r];
        const cls = (t===overallBest) ? "time best" : "time";
        let hrSub = "";
        if(showHR && sr.hrRepAvg && sr.hrRepAvg[r]!==undefined){
          hrSub = `<div class="rep-hr">${sr.hrRepAvg[r]}/${sr.hrRepMax[r]}</div>`;
        }
        return `<td class="${cls}" data-s="${sIdx}" data-r="${r}"><div>${t.toFixed(2)}</div>${hrSub}</td>`;
      }).join("");
      bodyRows += `<tr><td class="rep">${r+1}</td>${cols}</tr>`;
    }
    let avgRow = seriesArr.map(sr=>`<td class="time">${seriesAvg(sr.times).toFixed(2)}</td>`).join("");
    let totalRow = seriesArr.map(sr=>`<td class="time">${secToClock(seriesTotal(sr.times))}</td>`).join("");
    let hrRows = "";
    if(showHR && hasHR){
      const hrAvgRow = seriesArr.map(sr=>`<td class="time hrcell">${sr.hrAvg.toFixed(0)}</td>`).join("");
      const hrMaxRow = seriesArr.map(sr=>`<td class="time hrcell">${sr.hrMax}</td>`).join("");
      hrRows = `
        <tr class="hr"><td class="rep">FC média</td>${hrAvgRow}</tr>
        <tr class="hr"><td class="rep">FC máx.</td>${hrMaxRow}</tr>
      `;
    }

    tableWrap.innerHTML = `
      <table class="times">
        <thead><tr><th>Rep</th>${theadCols}</tr></thead>
        <tbody>${bodyRows}</tbody>
        <tfoot>
          <tr><td class="rep">Média</td>${avgRow}</tr>
          <tr class="total"><td class="rep">Total</td>${totalRow}</tr>
          ${hrRows}
        </tfoot>
      </table>
      <div class="stat-strip">
        <div class="stat-chip"><div class="l">Média geral</div><div class="v">${overallAvg.toFixed(2)}s</div></div>
        <div class="stat-chip"><div class="l">Melhor tempo</div><div class="v">${overallBest.toFixed(2)}s</div></div>
      </div>
    `;
  }

  if(hrToggle){
    hrToggle.addEventListener("click", ()=>{ showHR = !showHR; redraw(); });
  }

  redraw();
  return card;
}

function secToClockRep(totalSeconds){
  const m = Math.floor(totalSeconds/60);
  const s = totalSeconds - m*60;
  return m + "'" + s.toString().padStart(2,"0") + "''";
}

function buildEnduranceChartSVG(reps){
  const W=300, H=150, padL=32, padR=8, padT=8, padB=16;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n = reps.length;
  const allHR = reps.flatMap(r=>r.hr);
  const hrMin = Math.min(...allHR)-5, hrMax = Math.max(...allHR)+5;
  const yFor = v => padT + (hrMax-v)/(hrMax-hrMin)*plotH;
  const segW = plotW/n;

  let bg = `<rect x="0" y="0" width="${W}" height="${H}" fill="#FFFFFF"/>`;
  let grid = '';
  const STEPS=5;
  for(let g=0; g<=STEPS; g++){
    const gv = hrMin + (hrMax-hrMin)*g/STEPS;
    const gy = yFor(gv);
    grid += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#E7EEF3" stroke-width="1"/>`;
    grid += `<text x="${padL-4}" y="${(gy+2.5).toFixed(1)}" font-size="7" fill="#6B8598" text-anchor="end">${Math.round(gv)}</text>`;
  }

  let pts = [];
  let dividers = '';
  let labels = '';
  reps.forEach((r,idx)=>{
    const segStart = padL + idx*segW;
    r.hr.forEach((v,i)=>{
      const frac = i/((r.hr.length-1)||1);
      const x = segStart + frac*segW;
      pts.push(`${x.toFixed(1)},${yFor(v).toFixed(1)}`);
    });
    if(idx < n-1){
      const segEnd = segStart + segW;
      dividers += `<line x1="${segEnd.toFixed(1)}" y1="${padT}" x2="${segEnd.toFixed(1)}" y2="${H-padB}" stroke="#D8E2E8" stroke-width="1" stroke-dasharray="2,2"/>`;
    }
    labels += `<text x="${(segStart+segW/2).toFixed(1)}" y="${H-3}" font-size="7" fill="#6B8598" text-anchor="middle">${idx+1}</text>`;
  });

  const line = `<polyline points="${pts.join(' ')}" fill="none" stroke="#FB7185" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;">${bg}${grid}${dividers}${line}${labels}</svg>`;
}

function renderEnduranceSessionCard(session, athleteName){
  const card = document.createElement("div");
  card.className = "session-card";
  const reps = session.athletes[athleteName].reps;

  const allHR = reps.flatMap(r=>r.hr);
  const overallAvgHR = Math.round(allHR.reduce((a,b)=>a+b,0)/allHR.length);
  const overallMaxHR = Math.max(...reps.map(r=>r.hrMax));

  card.innerHTML = `
    <p class="s-title">${session.title}</p>
    <p class="s-date">${session.session || formatDate(session.date)}</p>
  `;

  const chartBox = document.createElement("div");
  chartBox.className = "chart-box";
  chartBox.innerHTML = buildEnduranceChartSVG(reps);
  card.appendChild(chartBox);

  const legendNote = document.createElement("p");
  legendNote.style.cssText = "font-size:10.5px;color:var(--pulse);margin:6px 0 12px;";
  legendNote.textContent = "— FC ao longo da sessão (linhas verticais marcam a mudança de repetição)";
  card.appendChild(legendNote);

  const tableWrap = document.createElement("div");
  const rows = reps.map(r=>{
    return `<tr>
      <td class="rep">${r.label}</td>
      <td class="desc">${r.desc}</td>
      <td class="time hrcell">${r.hrAvg.toFixed(0)}</td>
      <td class="time hrcell">${r.hrMax}</td>
    </tr>`;
  }).join("");

  tableWrap.innerHTML = `
    <table class="endurance-table">
      <thead><tr><th>Rep</th><th>Descrição</th><th>FC méd</th><th>FC máx</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="stat-strip">
      <div class="stat-chip"><div class="l">FC média</div><div class="v">${overallAvgHR}</div></div>
      <div class="stat-chip"><div class="l">FC máxima</div><div class="v">${overallMaxHR}</div></div>
    </div>
  `;
  card.appendChild(tableWrap);
  return card;
}

/* ============== TASK LIST / TASK VIEW ============== */

function viewTaskList(){
  const wrap = document.createElement("div");
  wrap.innerHTML = `<p class="page-title" style="font-weight:700">Tarefas</p>
    <p class="page-sub">Todas as sessões da semana</p>`;

  const list = [...SESSIONS].sort((a,b)=> b.date.localeCompare(a.date));
  if(list.length===0){
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "Ainda não há tarefas registadas.";
    wrap.appendChild(e);
    return wrap;
  }

  list.forEach(s=>{
    const card = document.createElement("button");
    card.className = "session-card";
    card.style.width = "100%";
    card.style.textAlign = "left";
    card.style.cursor = "pointer";
    const nAthletes = Object.keys(s.athletes).filter(a=>athleteHasData(s, a)).length;
    card.innerHTML = `<p class="s-title">${s.title}</p><p class="s-date">${s.session || formatDate(s.date)} · ${nAthletes} atleta${nAthletes===1?"":"s"}</p>`;
    card.onclick = ()=>{ state.view="task"; state.sessionId=s.id; render(); };
    wrap.appendChild(card);
  });
  return wrap;
}

function viewTask(){
  const wrap = document.createElement("div");
  const session = SESSIONS.find(s=>s.id===state.sessionId);
  if(!session){
    wrap.innerHTML = `<div class="empty">Tarefa não encontrada.</div>`;
    return wrap;
  }
  wrap.innerHTML = `<p class="page-title" style="font-weight:700">${session.title}</p>
    <p class="page-sub">${session.session || formatDate(session.date)}</p>`;

  ATHLETES.forEach(name=>{
    if(!athleteHasData(session, name)) return;
    const card = (session.type === "endurance")
      ? renderEnduranceSessionCard(session, name)
      : renderAthleteSessionCard(session, name);
    const nameTag = document.createElement("p");
    nameTag.style.cssText = "font-weight:700;font-size:13px;color:#35A7E8;margin:0 0 6px;";
    nameTag.textContent = name;
    card.insertBefore(nameTag, card.firstChild);
    const sTitle = card.querySelector(".s-title");
    const sDate = card.querySelector(".s-date");
    if(sTitle) sTitle.remove();
    if(sDate) sDate.remove();
    wrap.appendChild(card);
  });

  return wrap;
}

/* ============== BOOT ============== */

render();
setInterval(()=>{ if(state.view==="home") render(); }, 1000);
</script>
